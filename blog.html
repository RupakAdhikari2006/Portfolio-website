<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Rupak Adhikari</title>
  <meta name="description" content="Thoughts and articles on engineering, AI, robotics, and coding by Rupak Adhikari.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Ambient background decorations -->
  <div class="ambient-bg blob-1"></div>
  <div class="ambient-bg blob-2"></div>

  <!-- Header -->
  <header>
    <div class="container nav-wrapper">
      <a href="index.html" class="logo">
        Rupak Adhikari<span class="logo-dot"></span>
      </a>
      
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="blog.html" class="active">Blog</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>

      <div class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <!-- Blog Listing Container -->
  <section class="container" style="padding-top: 10rem; padding-bottom: 6rem;">
    <h1 class="section-title">Selected <span>Thoughts</span></h1>
    <p class="text-secondary" style="max-width: 600px; margin-bottom: 3rem; font-size: 1.1rem;">
      Written reflections on interface layout, engineering, typography, and simple design philosophies.
    </p>

    <!-- Search Controls -->
    <div style="max-width: 450px; width: 100%; margin-bottom: 4rem;">
      <input type="text" id="blog-search" class="form-control" placeholder="Search articles by title, keywords..." style="border-radius: 4px;">
    </div>

    <!-- Blog Posts Grid -->
    <div class="blog-grid">
      <!-- Loaded dynamically via js/app.js -->
      <div style="grid-column: 1/-1; text-align: center; padding: 3rem 0; color: var(--text-secondary);">
        Loading thoughts...
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container footer-wrapper">
      <p>&copy; 2026 Rupak Adhikari. Hand-coded with patience.</p>
      <div class="footer-socials">
        <a href="https://github.com/RupakAdhikari2006" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://www.linkedin.com/in/rupak-adhikari-40b436344/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast-msg">Notification message</div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
</body>
</html>
